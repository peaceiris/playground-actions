name: Main CI

on:
  push:
    branches:
    - master
  pull_request:
    types: [opened, synchronize]

jobs:
  greeting:
    runs-on: ubuntu-18.04
    #runs-on: macos-latest
    #runs-on: windows-latest
    steps:

    - uses: actions/checkout@v1
      with:
        fetch-depth: 1
        ref: v0.1.1

    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "${GITHUB_CONTEXT}"

    - name: hello
      run: |
        git branch
        pwd
        #ls -la
        #which shasum

    - run: echo ${HOME}
    - run: echo ${GITHUB_WORKSPACE}
    #- run: which certutil

#    - name: Hello from GitHub Package Registry
#      uses: docker://docker.pkg.github.com/peaceiris/playground-actions/latest:latest

  push-latest:
    runs-on: ubuntu-18.04
    env:
      DOCKER_BASE_NAME: docker.pkg.github.com/${{ github.repository }}/playground
    steps:

    - uses: actions/checkout@v1
      with:
        fetch-depth: 1

    - name: Set env
      run: |
        echo "::set-env name=PKG_LATEST::${DOCKER_BASE_NAME}:latest"

    - name: Build image
      run: |
        docker build . --file Dockerfile --tag "${PKG_LATEST}"

    - name: Test
      run: |
        docker run --rm "${PKG_LATEST}"

    - name: Scan image
      run: |
        export TRIVY_TAG=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r ".tag_name" | cut -d 'v' -f 2)
        wget https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_TAG}/trivy_${TRIVY_TAG}_Linux-64bit.tar.gz
        tar -zxvf trivy_${TRIVY_TAG}_Linux-64bit.tar.gz
        ./trivy --exit-code 1 "${PKG_LATEST}"
        # docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
        #   -v ${HOME}/.cache:/root/.cache aquasec/trivy:latest --exit-code 1 "${PKG_LATEST}"

    - run: sudo du -sh ${HOME}/.cache/trivy

    - name: Login to Package Registry
      if: github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "${GITHUB_TOKEN}" | docker login docker.pkg.github.com -u peaceiris --password-stdin

    - name: Push latest
      if: github.ref == 'refs/heads/master'
      run: |
        docker push "${PKG_LATEST}"
