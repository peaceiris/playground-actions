name: Release

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  release:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2

      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "${GITHUB_CONTEXT}"

      - name: Get release type
        run: |
          if [ "${{ github.event.action }}" == "opened" ]; then
            HEAD_REF="${{ github.head_ref }}"
            RELEASE_TYPE="${HEAD_REF#release-}"
          else
            RELEASE_TYPE="prerelease"
          fi
          echo "::set-env name=RELEASE_TYPE::${RELEASE_TYPE}"

      # - name: Set env
      #   run: echo "::set-env name=TAG_NAME::${GITHUB_REF##refs/tags/}"

      # - name: Validate tag format
      #   run: npx semver "${TAG_NAME}"

      # - name: Is prerelease
      #   id: is-prerelease
      #   run: |
      #     if [ -n "$(echo "${TAG_NAME}" | grep '\-')" ]; then
      #       export IS_PRERELEASE="true"
      #     else
      #       export IS_PRERELEASE="false"
      #     fi
      #     echo "::set-output name=IS_PRERELEASE::${IS_PRERELEASE}"

      - name: Read .nvmrc
        run: echo "::set-output name=NVMRC::$(cat .nvmrc)"
        id: nvm

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Cache
        uses: actions/cache@v1
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          npm version "${RELEASE_TYPE}"
          npm run release
          git push origin HEAD
          git push origin --tags

