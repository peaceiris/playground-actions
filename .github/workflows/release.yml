name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-18.04
    steps:

      - uses: actions/checkout@v1

      - name: Set env
        run: echo "::set-env name=TAG_NAME::${GITHUB_REF##refs/tags/}"

      - name: Validate tag format
        run: npx semver "${TAG_NAME}"

      - name: Is prerelease
        id: is-prerelease
        run: |
          if [ -n "$(echo "${TAG_NAME}" | grep '\-')" ]; then
            export IS_PRERELEASE="true"
          else
            export IS_PRERELEASE="false"
          fi
          echo "::set-output name=IS_PRERELEASE::${IS_PRERELEASE}"

      - name: Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          prerelease: ${{ steps.is-prerelease.outputs.IS_PRERELEASE }}
          body_path: CHANGELOG.md
          files: |
            asset_1.txt
            asset_2.txt
