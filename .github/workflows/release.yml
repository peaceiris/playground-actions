name: Release

on:
  push:
    branches:
      - 'release-*'

jobs:
  release:
    runs-on: ubuntu-18.04
    steps:

      - uses: actions/checkout@v2

      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "${GITHUB_CONTEXT}"

      - name: Get release type
        run: |
          if [ "${{ github.event.action }}" == "opened" ]; then
            HEAD_REF="${{ github.head_ref }}"
            RELEASE_TYPE="${HEAD_REF#release-}"
          else
            RELEASE_TYPE="prerelease"
          fi
          echo "::set-env name=RELEASE_TYPE::${RELEASE_TYPE}"

      - name: Read .nvmrc
        run: echo "::set-output name=NVMRC::$(cat .nvmrc)"
        id: nvm

      - name: Setup Node
        uses: actions/setup-node@v1
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"

      - name: Cache
        uses: actions/cache@v1
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci

      - name: Prepare release
        id: prepare_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git fetch origin
          git checkout -b "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
          npm version "${RELEASE_TYPE}"
          git push origin "${{ github.head_ref }}"
          export TAG_NAME="v$(jq -r '.version' ./package.json)"
          git push origin "${TAG_NAME}"
          echo "::set-output name=tag_name::${TAG_NAME}"

      - name: Install hub
        run: |
          HUB_VERSION="2.13.0"
          HUB_NAME="hub-linux-amd64-${HUB_VERSION}"
          HUB_TARBALL="${HUB_NAME}.tgz"
          wget -q "https://github.com/github/hub/releases/download/v${HUB_VERSION}/${HUB_TARBALL}"
          tar -zxvf "./${HUB_TARBALL}"
          mkdir ~/bin
          cp "./${HUB_NAME}/bin/hub" ~/bin/
          echo "::add-path::~/bin/"
          rm -rf "./${HUB_NAME}" "./${HUB_TARBALL}"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          hub release create \
            --draft \
            --prerelease \
            --file ./CHANGELOG.md \
            ${{ steps.prepare_release.outputs.tag_name }}
